<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding:20px;
        }

        .container{
            width:500px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            color:#fff;
            margin-bottom:25px;
        }

        label{
            color:#e2e8f0;
            font-weight:500;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#f8fafc;
            outline:none;
            font-size:15px;
        }

        input:focus{
            box-shadow:0 0 10px rgba(59,130,246,.5);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#3b82f6,#2563eb);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(37,99,235,.4);
        }

        ::placeholder{
            color:#94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cadastro de Alunos</h1>

        <form action="/cadastro" method="POST">

            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="telefone">Telefone:</label><br>
            <input type="text" id="telefone" name="telefone" placeholder="(84) 99999-9999" required><br><br>

            <label for="cpf">CPF:</label><br>
            <input type="text" id="cpf" name="cpf" placeholder="123.456.789-00" required><br><br>

            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" name="cidade" required><br><br>

            <label for="estado">Estado:</label><br>
            <input type="text" id="estado" name="estado" placeholder="Ex: CE" maxlength="2" required><br><br>

            <label for="curso">Curso:</label><br>
            <input type="text" id="curso" name="curso" required><br><br>

            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" name="idade" min="16" required><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" required><br><br>

            <button type="submit">Cadastrar</button>

        </form>
    </div>

</body>
</html>
